<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta property="og:title" content="현장 작업일보">
<meta property="og:description" content="삼육오컴퍼니 현장 작업일보 입력">
<meta property="og:type" content="website">
<title>현장 작업일보</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0;padding:12px}
.section{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1rem;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:500;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid #eee}
.chip{padding:7px 12px;border-radius:20px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.15s;white-space:nowrap}
.chip.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
input,select{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
input[type=date]{color:#1a1a1a}
.lbl{font-size:12px;color:#888;margin-bottom:4px;margin-top:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.add-btn{width:100%;padding:8px;border:0.5px dashed #ccc;border-radius:8px;background:transparent;color:#888;font-size:13px;cursor:pointer;margin-top:8px}
.add-btn:hover{background:#f5f5f0}
.item-box{border:0.5px solid #eee;border-radius:8px;padding:10px;margin-top:8px;position:relative}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;line-height:1;padding:0}
.card-chip{padding:8px 10px;border-radius:8px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;text-align:center}
.card-chip.on{background:#185FA5;border-color:#185FA5;color:#fff}
.card-chip.personal.on{background:#854F0B;border-color:#854F0B;color:#fff}
.warn-box{display:none;margin-top:8px;padding:10px 12px;background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;font-size:12px;color:#A32D2D;line-height:1.5}
.warn-box.show{display:block}
.warn-check{display:flex;align-items:flex-start;gap:8px;margin-top:8px}
.warn-check input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:1px;cursor:pointer}
.warn-check label{font-size:12px;color:#A32D2D;cursor:pointer;line-height:1.4}
.no-receipt-box{display:none;margin-top:8px;padding:10px 12px;background:#FAEEDA;border:0.5px solid #FAC775;border-radius:8px;font-size:12px;color:#633806;line-height:1.5}
.no-receipt-box.show{display:block}
.submit-btn{width:100%;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px}
.submit-btn:hover{background:#0F6E56}
.submit-btn:disabled{background:#aaa;cursor:not-allowed}
.file-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:0.5px dashed #ccc;border-radius:8px;color:#888;font-size:13px;cursor:pointer;margin-top:6px}
.file-label:hover{background:#f5f5f0}
.add-photo-btn{display:none;width:100%;padding:8px;border:0.5px dashed #1D9E75;border-radius:8px;background:transparent;color:#1D9E75;font-size:13px;cursor:pointer;margin-top:6px;text-align:center}
.preview-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preview-wrap canvas{width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid #eee}
.req{color:#E24B4A;margin-left:2px}
.time-row{display:flex;align-items:center;gap:6px}
.time-row span{color:#888;font-size:13px;flex-shrink:0}
.ot-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.ot-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ot-row label{font-size:13px;color:#888;cursor:pointer}
.vat-box{margin-top:8px;padding:10px 12px;background:#f5f5f0;border-radius:8px;display:none}
.vat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.vat-row span:first-child{font-size:12px;color:#888}
.vat-row span:last-child{font-size:13px;font-weight:500}
.vat-total{border-top:0.5px solid #ddd;margin-top:4px;padding-top:6px}
.vat-total span:last-child{color:#1D9E75}
.eq-chip{padding:7px 12px;border-radius:20px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all 0.15s;white-space:nowrap}
.eq-chip.on{background:#534AB7;border-color:#534AB7;color:#fff}
.personal-name-wrap{display:none;margin-top:8px}
.loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading.show{display:flex}
.loading-text{color:#fff;font-size:15px;font-weight:500}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.complete-box{display:none;background:#E1F5EE;border:0.5px solid #1D9E75;border-radius:12px;padding:1.5rem;margin-bottom:12px;text-align:center}
.complete-box.show{display:block}
.complete-title{font-size:18px;font-weight:500;color:#0F6E56;margin-bottom:8px}
.complete-desc{font-size:13px;color:#1D9E75;margin-bottom:16px}
.new-btn{width:100%;padding:12px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
.new-btn:hover{background:#0F6E56}
.history-box{background:#f5f5f0;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px}
.history-item{padding:6px 0;border-bottom:0.5px solid #ddd;display:flex;justify-content:space-between;align-items:center}
.history-item:last-child{border-bottom:none}
.history-btns{display:flex;gap:6px;margin-top:8px}
.history-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:none}
.btn-edit{background:#E6F1FB;color:#185FA5}
.edit-banner{display:none;background:#E6F1FB;border:0.5px solid #185FA5;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#185FA5;text-align:center}
.edit-banner.show{display:block}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">불러오는 중...</div>
</div>

<div style="padding:12px 0 4px">
  <p style="font-size:16px;font-weight:500;margin-bottom:2px">현장 작업일보</p>
  <p id="today-date" style="font-size:12px;color:#888"></p>
</div>

<div class="complete-box" id="complete-box">
  <div class="complete-title" id="complete-title">✅ 제출 완료!</div>
  <div class="complete-desc" id="complete-desc"></div>
  <button class="new-btn" onclick="startNewForm()">새 작업일보 작성하기</button>
</div>

<div id="main-form">

<div class="section">
  <div class="sec-title">작업 날짜 <span class="req">*</span></div>
  <input type="date" id="work-date" onchange="onDateOrProjChange()">
</div>

<div class="section">
  <div class="sec-title">프로젝트 번호 <span class="req">*</span></div>
  <select id="proj-sel" onchange="onDateOrProjChange()">
    <option value="">— 프로젝트 선택 —</option>
  </select>
  <div class="history-box" id="history-box" style="display:none">
    <p style="font-weight:500;margin-bottom:6px;color:#555">이미 제출된 작업일보가 있어요</p>
    <div id="history-list"></div>
    <div class="history-btns">
      <button class="history-btn btn-edit" onclick="startEdit()">✏️ 수정하기</button>
    </div>
  </div>
</div>

<div class="edit-banner" id="edit-banner">✏️ 수정 모드 — 기존 내용을 수정 후 제출하세요</div>

<div id="form-body" style="display:none">

<div class="section">
  <div class="sec-title">투입 작업자</div>
  <div class="chip-wrap" id="worker-wrap"></div>
  <div class="lbl">추가 인원</div>
  <input type="text" id="extra-workers" placeholder="추가 작업자 이름 입력 (쉼표로 구분)">
</div>

<div class="section">
  <div class="sec-title">작업 시간</div>
  <div class="time-row">
    <select id="t-start" style="flex:1"></select>
    <span>~</span>
    <select id="t-end" style="flex:1"></select>
  </div>
  <div class="ot-row">
    <input type="checkbox" id="ot-chk" onchange="toggleOT(this)">
    <label for="ot-chk">잔업 있음</label>
  </div>
  <div id="ot-wrap" style="display:none;margin-top:8px">
    <div class="lbl">잔업 시간</div>
    <div class="time-row">
      <select id="ot-start" style="flex:1"></select>
      <span>~</span>
      <select id="ot-end" style="flex:1"></select>
    </div>
  </div>
</div>

<div class="section">
  <div class="sec-title">경비 사용 내역</div>
  <div id="expense-list"></div>
  <button class="add-btn" onclick="addExpense()">+ 경비 항목 추가</button>
</div>

<div class="section">
  <div class="sec-title">장비 / 외주 사용 내역</div>
  <div id="equip-list"></div>
  <button class="add-btn" onclick="addEquip()">+ 항목 추가</button>
</div>

<div class="section">
  <div class="sec-title">영수증 / 거래명세서 <span class="req">*</span></div>
  <p style="font-size:11px;color:#888;margin-bottom:6px">사진 하단에 날짜 및 프로젝트 번호가 자동으로 표시됩니다</p>
  <label class="file-label">
    <input type="file" id="receipt-input" accept="image/*" multiple style="display:none" onchange="previewFiles(this,false)">
    📷 사진 촬영 또는 갤러리 선택
  </label>
  <label class="add-photo-btn" id="add-photo-btn">
    <input type="file" id="add-receipt-input" accept="image/*" multiple style="display:none" onchange="previewFiles(this,true)">
    📷 사진 추가 촬영
  </label>
  <div class="preview-wrap" id="preview-wrap"></div>
  <p style="font-size:11px;color:#bbb;margin-top:6px">영수증이 없는 경우 반드시 경위 메모를 촬영하여 첨부해주세요</p>
</div>

<div class="section">
  <div class="sec-title">작성자 <span class="req">*</span></div>
  <input type="text" id="writer" placeholder="작성자 이름 입력">
</div>

<div style="padding-bottom:30px">
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">작업일보 제출</button>
</div>

</div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzNI4xmJT7kaA06gosQ2BE6kg8i5i1M-z_4tq3jsr32-nftkN0sH86ox9xEmVo0oe9IoQ/exec';
let masterData={projects:[],workers:[],equipments:[],cards:[],expenseItems:[]};
let processedFiles=[];
let currentMode='new';
let currentSeq=1;
let expCount=0,eqCount=0;

const todayObj=new Date();
document.getElementById('today-date').textContent=todayObj.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

function getTodayStr(){
  const y=todayObj.getFullYear(),m=String(todayObj.getMonth()+1).padStart(2,'0'),d=String(todayObj.getDate()).padStart(2,'0');
  return`${y}.${m}.${d}`;
}
function getSelectedDate(){
  const v=document.getElementById('work-date').value;
  if(!v)return getTodayStr();
  const d=new Date(v+'T00:00:00');
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function getProjNum(){const v=document.getElementById('proj-sel').value;return v?v.split('|')[1]:'';}
function getProjBiz(){const v=document.getElementById('proj-sel').value;return v?v.split('|')[0]:'';}

async function loadMasterData(){
  showLoading('데이터 불러오는 중...');
  try {
    const [proj,workers,equip,cards,items]=await Promise.all([
      fetch(`${SCRIPT_URL}?action=getProjects`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getWorkers`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getEquipments`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getCards`).then(r=>r.json()),
      fetch(`${SCRIPT_URL}?action=getExpenseItems`).then(r=>r.json())
    ]);
    masterData.projects=proj.data||[];
    masterData.workers=workers.data||[];
    masterData.equipments=equip.data||[];
    masterData.cards=cards.data||[];
    masterData.expenseItems=items.data||[];
    buildProjectSelect();
    buildWorkerChips();
    buildTimePickers();
  } catch(e){console.error(e);}
  hideLoading();
  document.getElementById('work-date').value=todayObj.toISOString().split('T')[0];
}

function buildProjectSelect(){
  const sel=document.getElementById('proj-sel');
  sel.innerHTML='<option value="">— 프로젝트 선택 —</option>';
  masterData.projects.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=`${p.biz}|${p.projNum}|${p.projName}`;
    opt.textContent=`[${p.biz} ${p.projNum}] ${p.projName}`;
    sel.appendChild(opt);
  });
}

function buildWorkerChips(){
  const wrap=document.getElementById('worker-wrap');
  wrap.innerHTML='';
  masterData.workers.forEach(w=>{
    const div=document.createElement('div');
    div.className='chip';div.textContent=w.name;
    div.onclick=()=>div.classList.toggle('on');
    wrap.appendChild(div);
  });
}

function buildTimePickers(){
  makeTimes('t-start',5,18,'07:00');makeTimes('t-end',5,18,'16:00');
  makeTimes('ot-start',15,24,'18:00');makeTimes('ot-end',15,24,'21:00');
}

function makeTimes(selId,from,to,defVal){
  const sel=document.getElementById(selId);sel.innerHTML='';
  for(let h=from;h<=to;h++)for(let m=0;m<60;m+=30){
    if(h===to&&m>0)break;
    const t=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    sel.innerHTML+=`<option>${t}</option>`;
  }
  sel.value=defVal;
}

function toggleOT(cb){document.getElementById('ot-wrap').style.display=cb.checked?'block':'none';}

async function onDateOrProjChange(){
  const proj=document.getElementById('proj-sel').value;
  if(!proj){document.getElementById('form-body').style.display='none';document.getElementById('history-box').style.display='none';return;}
  const date=getSelectedDate();
  const projNum=getProjNum();
  showLoading('제출 이력 확인 중...');
  try {
    const res=await fetch(`${SCRIPT_URL}?action=checkSubmit&date=${encodeURIComponent(date)}&projNum=${encodeURIComponent(projNum)}`).then(r=>r.json());
    hideLoading();
    if(res.data&&res.data.length>0){
      showHistory(res.data);
    } else {
      document.getElementById('history-box').style.display='none';
      document.getElementById('edit-banner').classList.remove('show');
      currentMode='new';currentSeq=1;
      showFormBody();
    }
  } catch(e){hideLoading();showFormBody();}
}

function showHistory(data){
  const box=document.getElementById('history-box');
  const list=document.getElementById('history-list');
  box.style.display='block';
  document.getElementById('form-body').style.display='none';
  let html='';
  data.forEach((h,i)=>{
    html+=`<div class="history-item"><span style="font-weight:500">${h.writer}</span><span style="color:#888">${h.submitTime}</span></div>`;
  });
  list.innerHTML=html;
  currentSeq=data[data.length-1].seq;
}

function showFormBody(){
  document.getElementById('form-body').style.display='block';
  resetForm();
}

async function startEdit(){
  currentMode='edit';
  document.getElementById('history-box').style.display='none';
  document.getElementById('edit-banner').classList.add('show');
  showLoading('기존 데이터 불러오는 중...');
  const date=getSelectedDate();const projNum=getProjNum();
  try {
    const res=await fetch(`${SCRIPT_URL}?action=getSubmitData&date=${encodeURIComponent(date)}&projNum=${encodeURIComponent(projNum)}`).then(r=>r.json());
    hideLoading();
    document.getElementById('form-body').style.display='block';
    document.getElementById('submit-btn').textContent='수정 제출';
    document.getElementById('submit-btn').style.background='#185FA5';
    if(res.mainInfo&&res.mainInfo.workers){
      const workerNames=res.mainInfo.workers.split(',').map(s=>s.trim());
      document.querySelectorAll('#worker-wrap .chip').forEach(chip=>{
        if(workerNames.includes(chip.textContent.trim()))chip.classList.add('on');
      });
      if(res.mainInfo.timeStart)document.getElementById('t-start').value=res.mainInfo.timeStart.trim();
      if(res.mainInfo.timeEnd)document.getElementById('t-end').value=res.mainInfo.timeEnd.trim();
    }
  } catch(e){hideLoading();document.getElementById('form-body').style.display='block';}
}

function resetForm(){
  document.querySelectorAll('#worker-wrap .chip.on').forEach(c=>c.classList.remove('on'));
  document.getElementById('extra-workers').value='';
  document.getElementById('expense-list').innerHTML='';
  document.getElementById('equip-list').innerHTML='';
  document.getElementById('preview-wrap').innerHTML='';
  document.getElementById('add-photo-btn').style.display='none';
  document.getElementById('ot-chk').checked=false;
  document.getElementById('ot-wrap').style.display='none';
  document.getElementById('submit-btn').textContent='작업일보 제출';
  document.getElementById('submit-btn').style.background='#1D9E75';
  document.getElementById('edit-banner').classList.remove('show');
  processedFiles=[];expCount=0;eqCount=0;
  makeTimes('t-start',5,18,'07:00');makeTimes('t-end',5,18,'16:00');
}

function startNewForm(){
  document.getElementById('complete-box').classList.remove('show');
  document.getElementById('main-form').style.display='block';
  document.getElementById('proj-sel').value='';
  document.getElementById('history-box').style.display='none';
  document.getElementById('form-body').style.display='none';
  currentMode='new';currentSeq=1;
  resetForm();
  window.scrollTo(0,0);
}

function addExpense(){
  expCount++;const id=expCount;
  const div=document.createElement('div');
  div.className='item-box';div.id='exp-'+id;
  const cardHtml=masterData.cards.map(c=>`<div class="card-chip" data-biz="${c.biz}" data-cardco="${c.cardCo}" data-last4="${c.last4}" data-personal="false" onclick="selCard(this,'${id}')">${c.cardCo}(${c.last4})</div>`).join('');
  const itemHtml=masterData.expenseItems.map(i=>`<option>${i}</option>`).join('');
  div.innerHTML=`
    <button class="del-btn" onclick="document.getElementById('exp-${id}').remove()">×</button>
    <div class="lbl" style="margin-top:0">사용 카드</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px" id="cards-${id}">
      ${cardHtml}
      <div class="card-chip personal" data-biz="개인" data-cardco="개인" data-last4="-" data-personal="true" onclick="selCard(this,'${id}')">개인카드</div>
    </div>
    <div class="warn-box" id="warn-${id}">
      해당 현장과 사용 카드가 일치하지 않습니다. 사업장에 맞는 카드를 사용해주세요!
      <div class="warn-check"><input type="checkbox" id="warn-ck-${id}"><label for="warn-ck-${id}">확인했습니다 (부득이한 사유로 타 법인 카드 사용)</label></div>
    </div>
    <div class="personal-name-wrap" id="pname-wrap-${id}">
      <div class="lbl">사용자명</div>
      <input type="text" id="pname-${id}" placeholder="개인카드 사용자 이름 입력">
    </div>
    <div class="no-receipt-box" id="no-receipt-${id}">
      개인카드 사용 후 영수증 미첨부시 경비지급이 불가하오니 반드시 첨부해주세요!
      <div class="warn-check"><input type="checkbox" id="no-receipt-ck-${id}"><label for="no-receipt-ck-${id}">확인했습니다.</label></div>
    </div>
    <div class="row2" style="margin-top:8px">
      <div><div class="lbl">금액</div><input type="number" id="exp-amt-${id}" placeholder="0" style="text-align:right"></div>
      <div><div class="lbl">항목</div><select id="exp-item-${id}"><option value="">선택</option>${itemHtml}</select></div>
    </div>`;
  document.getElementById('expense-list').appendChild(div);
}

function selCard(el,id){
  document.querySelectorAll(`#cards-${id} .card-chip`).forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  const isPersonal=el.dataset.personal==='true';
  document.getElementById('pname-wrap-'+id).style.display=isPersonal?'block':'none';
  document.getElementById('no-receipt-'+id).classList.toggle('show',isPersonal);
  const warn=document.getElementById('warn-'+id);
  if(!isPersonal){const projBiz=getProjBiz();if(projBiz&&el.dataset.biz!==projBiz)warn.classList.add('show');else warn.classList.remove('show');}
  else warn.classList.remove('show');
}

function selEqChip(el,gid){document.querySelectorAll(`#eq-chips-${gid} .eq-chip`).forEach(c=>c.classList.remove('on'));el.classList.add('on');}

function addEquip(){
  eqCount++;const id=eqCount;
  const div=document.createElement('div');div.className='item-box';div.id='eq-'+id;
  const eqHtml=masterData.equipments.map(e=>`<div class="eq-chip" onclick="selEqChip(this,'${id}')">${e}</div>`).join('');
  div.innerHTML=`
    <button class="del-btn" onclick="document.getElementById('eq-${id}').remove()">×</button>
    <div class="lbl" style="margin-top:0">종류 (하나만 선택)</div>
    <div class="chip-wrap" id="eq-chips-${id}" style="margin-top:6px">${eqHtml}</div>
    <div class="row2" style="margin-top:8px">
      <div><div class="lbl">업체명</div><input type="text" id="eq-company-${id}" placeholder="업체명"></div>
      <div><div class="lbl">공급가액</div><input type="number" id="supply-${id}" placeholder="0" style="text-align:right" oninput="calcVat('${id}')"></div>
    </div>
    <div class="vat-box" id="vat-box-${id}">
      <div class="vat-row"><span>공급가액</span><span id="vat-supply-${id}">0원</span></div>
      <div class="vat-row"><span>부가세 (10%)</span><span id="vat-tax-${id}">0원</span></div>
      <div class="vat-row vat-total"><span style="font-weight:500">합계 (부가세 포함)</span><span id="vat-total-${id}" style="font-weight:500">0원</span></div>
    </div>`;
  document.getElementById('equip-list').appendChild(div);
}

function calcVat(id){
  const supply=parseInt(document.getElementById('supply-'+id).value)||0;
  const vat=Math.round(supply*0.1),total=supply+vat;
  const box=document.getElementById('vat-box-'+id);
  if(supply>0){
    box.style.display='block';
    document.getElementById('vat-supply-'+id).textContent=supply.toLocaleString()+'원';
    document.getElementById('vat-tax-'+id).textContent=vat.toLocaleString()+'원';
    document.getElementById('vat-total-'+id).textContent=total.toLocaleString()+'원';
  } else box.style.display='none';
}

function addWatermark(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=img.width;canvas.height=img.height;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0);
        const watermark=`${getSelectedDate()} / ${getProjNum()||''}`;
        const fontSize=Math.max(20,Math.round(img.width*0.035));
        ctx.font=`bold ${fontSize}px sans-serif`;
        const padding=Math.round(img.width*0.03);
        const textW=ctx.measureText(watermark).width,textH=fontSize;
        const boxPad=Math.round(fontSize*0.4);
        const boxX=(img.width-textW)/2-boxPad,boxY=img.height-padding-textH-boxPad*2;
        ctx.fillStyle='rgba(0,0,0,0.45)';
        ctx.beginPath();ctx.roundRect(boxX,boxY,textW+boxPad*2,textH+boxPad*2,6);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.92)';ctx.textBaseline='top';
        ctx.fillText(watermark,(img.width-textW)/2,boxY+boxPad);
        canvas.toBlob(blob=>{
          const r2=new FileReader();
          r2.onload=e2=>resolve({dataUrl:e2.target.result,canvas,name:file.name});
          r2.readAsDataURL(blob);
        },'image/jpeg',0.85);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function previewFiles(input,isAdd){
  const wrap=document.getElementById('preview-wrap');
  if(!isAdd){wrap.innerHTML='';processedFiles=[];}
  const files=Array.from(input.files);
  for(const f of files){
    const result=await addWatermark(f);
    processedFiles.push({dataUrl:result.dataUrl,name:result.name});
    const c=result.canvas;
    c.style.cssText='width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid #eee';
    wrap.appendChild(c);
  }
  document.getElementById('add-photo-btn').style.display='block';
  input.value='';
}

document.getElementById('add-photo-btn').onclick=()=>document.getElementById('add-receipt-input').click();

function showLoading(msg){document.getElementById('loading-text').textContent=msg||'처리 중...';document.getElementById('loading').classList.add('show');}
function hideLoading(){document.getElementById('loading').classList.remove('show');}

async function submitForm(){
  const proj=document.getElementById('proj-sel').value;
  const writer=document.getElementById('writer').value.trim();
  if(!proj){alert('프로젝트를 선택해주세요.');return;}
  if(!writer){alert('작성자를 입력해주세요.');return;}
  if(processedFiles.length===0){alert('영수증 또는 증빙 사진을 첨부해주세요.');return;}
  if(document.querySelectorAll('.warn-box.show input[type=checkbox]:not(:checked)').length>0){alert('카드 불일치 항목을 확인 후 체크해주세요.');return;}
  if(document.querySelectorAll('.no-receipt-box.show input[type=checkbox]:not(:checked)').length>0){alert('개인카드 영수증 첨부 확인 체크를 해주세요.');return;}

  const projParts=proj.split('|');
  const projBiz=projParts[0]||'',projNum=projParts[1]||'',projName=projParts[2]||'';
  const dateStr=getSelectedDate();
  const submitTime=new Date().toLocaleString('ko-KR');

  const selectedWorkers=Array.from(document.querySelectorAll('#worker-wrap .chip.on')).map(c=>c.textContent);
  const extra=document.getElementById('extra-workers').value.trim();
  if(extra)selectedWorkers.push(...extra.split(',').map(s=>s.trim()).filter(Boolean));
  const workers=selectedWorkers.join(', ');

  const timeStart=document.getElementById('t-start').value;
  const timeEnd=document.getElementById('t-end').value;
  const otChk=document.getElementById('ot-chk').checked;
  const overtime=otChk?`${document.getElementById('ot-start').value}~${document.getElementById('ot-end').value}`:'';

  const expenses=[];
  document.querySelectorAll('.item-box[id^="exp-"]').forEach(box=>{
    const id=box.id.replace('exp-','');
    const cardEl=box.querySelector('.card-chip.on');
    const amt=parseInt(document.getElementById('exp-amt-'+id)?.value)||0;
    const item=document.getElementById('exp-item-'+id)?.value||'';
    if(!cardEl||amt===0)return;
    const isPersonal=cardEl.dataset.personal==='true';
    expenses.push({cardCo:cardEl.dataset.cardco,last4:cardEl.dataset.last4,biz:cardEl.dataset.biz,isPersonal,userName:isPersonal?(document.getElementById('pname-'+id)?.value||'미입력'):'',item,amount:amt});
  });

  const equips=[];
  document.querySelectorAll('.item-box[id^="eq-"]').forEach(box=>{
    const id=box.id.replace('eq-','');
    const typeEl=box.querySelector('.eq-chip.on');
    const company=document.getElementById('eq-company-'+id)?.value||'';
    const supply=parseInt(document.getElementById('supply-'+id)?.value)||0;
    if(!typeEl)return;
    equips.push({type:typeEl.textContent,company,supplyAmt:supply,vatAmt:Math.round(supply*0.1),totalAmt:supply+Math.round(supply*0.1)});
  });

  const payload={type:'expense',date:dateStr,projNum,projName,projBiz,workers,workerCount:selectedWorkers.length,timeStart,timeEnd,overtime,expenses,equips,imageCount:processedFiles.length,writer,submitTime,seq:currentSeq,isRevision:currentMode==='edit'};

  showLoading('데이터 저장 중...');
  document.getElementById('submit-btn').disabled=true;

  try {
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    for(let i=0;i<processedFiles.length;i++){
      showLoading(`영수증 업로드 중... (${i+1}/${processedFiles.length})`);
      await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({type:'image',date:dateStr,projNum,imageData:processedFiles[i].dataUrl,fileName:`${dateStr}_${projNum}_${currentSeq}_${i+1}.jpg`})});
    }
    hideLoading();
    document.getElementById('submit-btn').disabled=false;
    document.getElementById('main-form').style.display='none';
    const box=document.getElementById('complete-box');
    box.classList.add('show');
    document.getElementById('complete-title').textContent=currentMode==='edit'?'✅ 수정 완료!':'✅ 제출 완료!';
    document.getElementById('complete-desc').textContent=`${projName} | ${writer} | 영수증 ${processedFiles.length}장`;
    window.scrollTo(0,0);
    currentMode='new';currentSeq=1;
  } catch(err){
    hideLoading();
    alert('제출 중 오류가 발생했습니다.\n'+err.message);
    document.getElementById('submit-btn').disabled=false;
  }
}

loadMasterData();
